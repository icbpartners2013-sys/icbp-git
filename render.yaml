databases:
  - name: icbp-db  # Changed from erp_db
    databaseName: icbp_db
    user: icbp_db_user
    plan: free # or your specific plan
    region: oregon 

services:
  - type: web
    name: icbp-git
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn erp_core.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: icbp-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: FRONTEND_URL
        value: https://icbp-frontend.onrender.com
      - key: JWT_SECRET
        value: icbp-jwt-secret-key-2024
      - key: MONGO_URI
        value: mongodb+srv://icbpartners2013_db_user:vge7sPGujXVFtp8Y@icbp-mongodb.rbtxg6z.mongodb.net/?appName=icbp-mongodb
      - key: WEB_CONCURRENCY
        value: 4

  - type: web
    name: icbp-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
