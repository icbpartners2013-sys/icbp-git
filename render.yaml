databases:
  - name: erp_db
    databaseName: erp_db
    user: erp_user

services:
  - type: web
    name: erp-web
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn erp_core.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: erp_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
